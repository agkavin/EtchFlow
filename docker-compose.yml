services:

  etchflow:
    build:
      context: .
      dockerfile: deploy/server.Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://etchflow:etchflow@postgres:5432/etchflow?sslmode=disable
      DB_POOL_MAX_CONNS: "10"
      HTTP_PORT: "8080"
      LOG_LEVEL: info
      LOG_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: etchflow
      POSTGRES_PASSWORD: etchflow
      POSTGRES_DB: etchflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Migrations are auto-executed by Postgres on first boot (sorted alphabetically).
      # To re-run migrations: docker compose down -v (wipes the volume).
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etchflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
